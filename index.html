<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <title>Voice Shopping List</title>
  <style>
    html[dir="rtl"] .item { flex-direction: row-reverse; }
    html[dir="rtl"] .manual-add { padding-right: 16px; padding-left: 100px; }
    html[dir="rtl"] .mic-wrap { right: auto; left: 24px; }
    html[dir="rtl"] header { flex-direction: row-reverse; }
    html[dir="rtl"] .item-text { text-align: right; }
    html[dir="rtl"] .item-time { text-align: right; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-btn {
      background: none;
      border: none;
      color: #8888aa;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all .2s;
    }

    .header-btn:hover { color: #eee; background: rgba(255,255,255,.08); }
    .header-btn.danger:hover { color: #ff6b6b; }

    .item-count {
      font-size: 13px;
      color: #8888aa;
      padding: 8px 20px 4px;
    }

    #list {
      padding: 8px 16px 120px;
      list-style: none;
    }

    .empty-msg {
      text-align: center;
      color: #555;
      margin-top: 30vh;
      font-size: 16px;
      line-height: 1.5;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 6px 0;
      background: #16213e;
      border-radius: 12px;
      transition: all .25s;
      animation: slideIn .25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      opacity: .45;
    }

    .item.checked .item-text {
      text-decoration: line-through;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #555;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .item.checked .checkbox {
      border-color: #4ecca3;
      background: #4ecca3;
    }

    .checkbox::after {
      content: '';
      display: none;
      width: 6px;
      height: 10px;
      border: solid #1a1a2e;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .item.checked .checkbox::after { display: block; }

    .item-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.3;
    }

    .item-time {
      font-size: 11px;
      color: #666;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color .2s;
    }

    .delete-btn:hover { color: #ff6b6b; }

    /* Floating mic button */
    .mic-wrap {
      position: fixed;
      bottom: 72px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .mic-status {
      background: rgba(0,0,0,.7);
      color: #eee;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      white-space: nowrap;
      max-width: 250px;
      text-align: center;
    }

    .mic-status.visible { opacity: 1; }

    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #4ecca3;
      color: #1a1a2e;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(78, 204, 163, .4);
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:active { transform: scale(.92); }

    .mic-btn.listening {
      background: #ff6b6b;
      box-shadow: 0 0 0 0 rgba(255, 107, 107, .6);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255, 107, 107, .5); }
      70%  { box-shadow: 0 0 0 18px rgba(255, 107, 107, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
    }

    .mic-btn svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    /* Manual add bar */
    .manual-add {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #16213e;
      padding: 10px 16px;
      padding-right: 100px;
      display: flex;
      gap: 8px;
      box-shadow: 0 -2px 8px rgba(0,0,0,.3);
      z-index: 50;
    }

    .manual-add input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      color: #eee;
      font-size: 15px;
      outline: none;
    }

    .manual-add input:focus { border-color: #4ecca3; }

    .manual-add button {
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    /* Unsupported banner */
    .unsupported {
      display: none;
      background: #ff6b6b;
      color: #fff;
      text-align: center;
      padding: 12px;
      font-size: 14px;
    }

    .unsupported.show { display: block; }
  </style>
</head>
<body>

<div class="unsupported" id="unsupported">
  Speech recognition is not supported in this browser. Try Chrome or Safari.
</div>

<header>
  <h1>Shopping List</h1>
  <div class="header-actions">
    <button class="header-btn" onclick="clearChecked()">Clear done</button>
    <button class="header-btn danger" onclick="clearAll()">Clear all</button>
    <button class="header-btn" id="langBtn" onclick="toggleLang()">HE</button>
  </div>
</header>

<div class="item-count" id="count"></div>
<ul id="list"></ul>

<div class="manual-add">
  <input type="text" id="manualInput" placeholder="Type an item..." enterkeyhint="done">
  <button onclick="addManual()">Add</button>
</div>

<div class="mic-wrap">
  <div class="mic-status" id="micStatus"></div>
  <button class="mic-btn" id="micBtn" aria-label="Voice add">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
</div>

<script>
  const STORAGE_KEY = 'voice-shopping-list';
  const LANG_KEY = 'voice-shopping-lang';

  const i18n = {
    en: {
      title: 'Shopping List',
      clearDone: 'Clear done',
      clearAll: 'Clear all',
      toggleLang: 'HE',
      placeholder: 'Type an item...',
      add: 'Add',
      empty: 'Tap the mic button and say what you need!',
      remaining: (n) => `${n} item${n !== 1 ? 's' : ''} remaining`,
      listening: 'Listening...',
      noSpeech: "Didn't catch that",
      added: (s) => `Added: ${s}`,
      confirmClear: 'Clear the entire list?',
      justNow: 'just now',
      mAgo: (n) => `${n}m ago`,
      hAgo: (n) => `${n}h ago`,
    },
    he: {
      title: '\u05E8\u05E9\u05D9\u05DE\u05EA \u05E7\u05E0\u05D9\u05D5\u05EA',
      clearDone: '\u05E0\u05E7\u05D4 \u05E1\u05D9\u05D5\u05DD',
      clearAll: '\u05E0\u05E7\u05D4 \u05D4\u05DB\u05DC',
      toggleLang: 'EN',
      placeholder: '\u05D4\u05E7\u05DC\u05D3 \u05E4\u05E8\u05D9\u05D8...',
      add: '\u05D4\u05D5\u05E1\u05E3',
      empty: '\u05DC\u05D7\u05E5 \u05E2\u05DC \u05D4\u05DE\u05D9\u05E7\u05E8\u05D5\u05E4\u05D5\u05DF \u05D5\u05D0\u05DE\u05D5\u05E8 \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05E6\u05E8\u05D9\u05DA!',
      remaining: (n) => `${n} \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u05E0\u05D5\u05EA\u05E8\u05D5`,
      listening: '\u05DE\u05D0\u05D6\u05D9\u05DF...',
      noSpeech: '\u05DC\u05D0 \u05E7\u05DC\u05D8\u05EA\u05D9',
      added: (s) => `\u05E0\u05D5\u05E1\u05E3: ${s}`,
      confirmClear: '\u05DC\u05E0\u05E7\u05D5\u05EA \u05D0\u05EA \u05DB\u05DC \u05D4\u05E8\u05E9\u05D9\u05DE\u05D4?',
      justNow: '\u05E2\u05DB\u05E9\u05D9\u05D5',
      mAgo: (n) => `\u05DC\u05E4\u05E0\u05D9 ${n} \u05D3\u05E7\u05D5\u05EA`,
      hAgo: (n) => `\u05DC\u05E4\u05E0\u05D9 ${n} \u05E9\u05E2\u05D5\u05EA`,
    }
  };

  let lang = localStorage.getItem(LANG_KEY) || 'en';
  function t() { return i18n[lang]; }

  function applyLang() {
    const s = t();
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
    document.querySelector('header h1').textContent = s.title;
    document.querySelector('.header-btn').textContent = s.clearDone;
    document.querySelector('.header-btn.danger').textContent = s.clearAll;
    document.getElementById('langBtn').textContent = s.toggleLang;
    manualInput.placeholder = s.placeholder;
    document.querySelector('.manual-add button').textContent = s.add;
    localStorage.setItem(LANG_KEY, lang);
    if (recognition) recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';
    render();
  }

  function toggleLang() {
    lang = lang === 'en' ? 'he' : 'en';
    applyLang();
  }
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const micBtn = document.getElementById('micBtn');
  const micStatus = document.getElementById('micStatus');
  const manualInput = document.getElementById('manualInput');

  // --- Data ---
  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    listEl.innerHTML = '';
    const s = t();
    if (!items.length) {
      listEl.innerHTML = `<div class="empty-msg">${s.empty}</div>`;
    }
    // Show unchecked first, then checked
    const sorted = [...items].sort((a, b) => a.checked - b.checked);
    sorted.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.checked ? ' checked' : '');
      li.innerHTML = `
        <div class="checkbox" onclick="toggle('${item.id}')"></div>
        <div style="flex:1">
          <div class="item-text">${esc(item.text)}</div>
          <div class="item-time">${timeAgo(item.ts)}</div>
        </div>
        <button class="delete-btn" onclick="remove('${item.id}')">&times;</button>
      `;
      listEl.appendChild(li);
    });
    const unchecked = items.filter(i => !i.checked).length;
    countEl.textContent = items.length ? s.remaining(unchecked) : '';
  }

  function addItem(text) {
    text = text.trim();
    if (!text) return;
    // Capitalize first letter
    text = text.charAt(0).toUpperCase() + text.slice(1);
    items.push({ id: uid(), text, checked: false, ts: Date.now() });
    save();
    render();
  }

  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.checked = !item.checked; save(); render(); }
  }

  function remove(id) {
    items = items.filter(i => i.id !== id);
    save(); render();
  }

  function clearChecked() {
    items = items.filter(i => !i.checked);
    save(); render();
  }

  function clearAll() {
    if (items.length && confirm(t().confirmClear)) {
      items = []; save(); render();
    }
  }

  function addManual() {
    addItem(manualInput.value);
    manualInput.value = '';
  }

  manualInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addManual();
  });

  // --- Speech Recognition ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  let listening = false;

  if (!SpeechRecognition) {
    document.getElementById('unsupported').classList.add('show');
    micBtn.style.display = 'none';
  } else {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      showStatus(t().listening);
    };

    recognition.onresult = (e) => {
      const last = e.results[e.results.length - 1];
      const transcript = last[0].transcript;

      if (last.isFinal) {
        const extracted = extractItems(transcript);
        extracted.forEach(addItem);
        const msg = extracted.length
          ? t().added(extracted.join(', '))
          : t().added(transcript.trim());
        showStatus(msg, 2000);
        if (!extracted.length) addItem(transcript);
      } else {
        showStatus(transcript);
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') {
        showStatus(t().noSpeech, 1500);
      } else if (e.error !== 'aborted') {
        showStatus('Error: ' + e.error, 2000);
      }
      stopListening();
    };

    recognition.onend = () => {
      stopListening();
    };
  }

  micBtn.addEventListener('click', () => {
    if (listening) {
      recognition.abort();
      stopListening();
    } else {
      try { recognition.start(); } catch(e) {}
    }
  });

  function stopListening() {
    listening = false;
    micBtn.classList.remove('listening');
  }

  function showStatus(msg, autoHide) {
    micStatus.textContent = msg;
    micStatus.classList.add('visible');
    if (autoHide) {
      setTimeout(() => micStatus.classList.remove('visible'), autoHide);
    }
  }

  // --- Extract items from spoken text ---
  function extractItems(text) {
    if (lang === 'he') {
      // Remove Hebrew filler phrases
      text = text
        .replace(/^(אני צריך|אנחנו צריכים|תוסיף|תוסיפי|תקנה|תקני|קנה|קני|תביא|תביאי)\s+/i, '')
        .replace(/\s+(בבקשה|תודה)\.?$/i, '')
        .trim();
      // Split on "ו" prefix, commas, "גם"
      const parts = text.split(/\s*(?:,\s*|\s+וגם\s+|\s+גם\s+)/i)
        .map(s => s.trim())
        .filter(Boolean);
      // Handle "ו" prefix for "and" (e.g. "חלב ולחם")
      const expanded = [];
      parts.forEach(p => {
        const sub = p.split(/\s+ו/);
        if (sub.length > 1) {
          expanded.push(sub[0].trim());
          sub.slice(1).forEach(s => { if (s.trim()) expanded.push(s.trim()); });
        } else {
          expanded.push(p);
        }
      });
      return expanded.filter(Boolean);
    }

    // English: remove filler phrases
    text = text
      .replace(/^(i need|we need|add|get|buy|grab|pick up|put|remember)\s+/i, '')
      .replace(/^(some|a|an)\s+/i, '')
      .replace(/\s+(please|thanks|thank you)\.?$/i, '')
      .trim();

    const parts = text.split(/\s*(?:,\s*|\s+and\s+|\s+also\s+)/i)
      .map(s => s.trim())
      .filter(Boolean);

    return parts.map(p => {
      return p
        .replace(/^(some|a few|a couple of|a|an)\s+/i, '')
        .trim();
    }).filter(Boolean);
  }

  // --- Helpers ---
  function uid() { return Math.random().toString(36).slice(2, 10); }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function timeAgo(ts) {
    const s = t();
    const diff = Date.now() - ts;
    if (diff < 60000) return s.justNow;
    if (diff < 3600000) return s.mAgo(Math.floor(diff / 60000));
    if (diff < 86400000) return s.hAgo(Math.floor(diff / 3600000));
    return new Date(ts).toLocaleDateString(lang === 'he' ? 'he-IL' : 'en-US');
  }

  // Init
  applyLang();

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
