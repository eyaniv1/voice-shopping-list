<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shop">
  <meta name="theme-color" content="#0f0f1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #eee;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== MIC SCREEN (default) ===== */
    .mic-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      position: relative;
    }

    .mic-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: #4ecca3;
      color: #0f0f1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(78,204,163,.3);
      transition: transform .15s, background .2s, box-shadow .2s;
      position: relative;
      z-index: 10;
    }

    .mic-btn:active { transform: scale(.9); }

    .mic-btn svg { width: 56px; height: 56px; fill: currentColor; }

    .mic-btn.listening {
      background: #ff6b6b;
      box-shadow: 0 0 0 0 rgba(255,107,107,.5);
      animation: pulse 1.4s ease-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,107,107,.45); }
      70%  { box-shadow: 0 0 0 35px rgba(255,107,107,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
    }

    /* Toast */
    .toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -80px);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 17px;
      font-weight: 500;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
      text-align: center;
      max-width: 85%;
      z-index: 20;
    }

    .toast.visible { opacity: 1; }

    /* Transcript preview while listening */
    .transcript {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 100px);
      color: rgba(255,255,255,.5);
      font-size: 15px;
      text-align: center;
      max-width: 80%;
      min-height: 22px;
    }

    /* Badge: item count — tap to open list */
    .badge {
      position: absolute;
      bottom: max(40px, env(safe-area-inset-bottom, 20px));
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #aaa;
      font-size: 14px;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .2s;
    }

    .badge:active { background: rgba(255,255,255,.15); }
    .badge.hidden { display: none; }

    /* Lang toggle */
    .lang-toggle {
      position: absolute;
      top: max(16px, env(safe-area-inset-top, 16px));
      right: 20px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: #888;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
    }

    .lang-toggle:active { background: rgba(255,255,255,.15); }

    /* ===== LIST PANEL (slides up) ===== */
    .list-panel {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      z-index: 50;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .list-panel.open { transform: translateY(0); }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }

    .list-header h2 { font-size: 20px; font-weight: 600; }

    .list-header-actions { display: flex; gap: 12px; align-items: center; }

    .list-header-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .list-header-btn:active { color: #eee; background: rgba(255,255,255,.08); }
    .list-header-btn.danger:active { color: #ff6b6b; }

    .close-btn {
      background: rgba(255,255,255,.1);
      border: none;
      color: #eee;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .list-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 16px 16px;
    }

    .list-empty {
      text-align: center;
      color: #444;
      margin-top: 25vh;
      font-size: 16px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 5px 0;
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      animation: slideIn .2s ease-out;
    }

    html[dir="rtl"] .item { flex-direction: row-reverse; }
    html[dir="rtl"] .item-text { text-align: right; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked { opacity: .4; }
    .item.checked .item-text { text-decoration: line-through; }

    .checkbox {
      width: 26px;
      height: 26px;
      border: 2px solid #444;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .item.checked .checkbox { border-color: #4ecca3; background: #4ecca3; }

    .checkbox::after {
      content: '';
      display: none;
      width: 7px;
      height: 11px;
      border: solid #0f0f1a;
      border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg) translate(-1px,-1px);
    }

    .item.checked .checkbox::after { display: block; }

    .item-text { flex: 1; font-size: 17px; line-height: 1.3; }

    .delete-btn {
      background: none;
      border: none;
      color: #444;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 4px;
      line-height: 1;
    }

    .delete-btn:active { color: #ff6b6b; }

    /* Unsupported */
    .unsupported {
      display: none;
      position: absolute;
      top: max(20px, env(safe-area-inset-top));
      left: 20px;
      right: 20px;
      background: #ff6b6b;
      color: #fff;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
    }

    .unsupported.show { display: block; }
  </style>
</head>
<body>

<!-- MIC SCREEN -->
<div class="mic-screen">
  <div class="unsupported" id="unsupported">
    Speech recognition not supported. Use Safari 14.5+ or Chrome.
  </div>

  <button class="lang-toggle" id="langBtn" onclick="toggleLang()">HE</button>

  <div class="toast" id="toast"></div>

  <button class="mic-btn" id="micBtn" aria-label="Record">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>

  <div class="transcript" id="transcript"></div>

  <div class="badge hidden" id="badge" onclick="openList()"></div>
</div>

<!-- LIST PANEL -->
<div class="list-panel" id="listPanel">
  <div class="list-header">
    <h2 id="listTitle">Shopping List</h2>
    <div class="list-header-actions">
      <button class="list-header-btn" id="clearDoneBtn" onclick="clearChecked()">Clear done</button>
      <button class="list-header-btn danger" id="clearAllBtn" onclick="clearAll()">Clear all</button>
      <button class="close-btn" onclick="closeList()">&times;</button>
    </div>
  </div>
  <div class="list-body" id="listBody"></div>
</div>

<script>
  const STORAGE_KEY = 'voice-shopping-list';
  const LANG_KEY = 'voice-shopping-lang';

  const i18n = {
    en: {
      toggleLang: 'HE',
      title: 'Shopping List',
      clearDone: 'Clear done',
      clearAll: 'Clear all',
      viewList: (n) => `${n} item${n !== 1 ? 's' : ''} — view list`,
      listening: 'Listening...',
      noSpeech: "Didn't catch that",
      added: (s) => `\u2713 ${s}`,
      confirmClear: 'Clear the entire list?',
      empty: 'No items yet',
    },
    he: {
      toggleLang: 'EN',
      title: '\u05E8\u05E9\u05D9\u05DE\u05EA \u05E7\u05E0\u05D9\u05D5\u05EA',
      clearDone: '\u05E0\u05E7\u05D4 \u05E1\u05D9\u05D5\u05DD',
      clearAll: '\u05E0\u05E7\u05D4 \u05D4\u05DB\u05DC',
      viewList: (n) => `${n} \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u2014 \u05E6\u05E4\u05D4 \u05D1\u05E8\u05E9\u05D9\u05DE\u05D4`,
      listening: '\u05DE\u05D0\u05D6\u05D9\u05DF...',
      noSpeech: '\u05DC\u05D0 \u05E7\u05DC\u05D8\u05EA\u05D9',
      added: (s) => `\u2713 ${s}`,
      confirmClear: '\u05DC\u05E0\u05E7\u05D5\u05EA \u05D0\u05EA \u05DB\u05DC \u05D4\u05E8\u05E9\u05D9\u05DE\u05D4?',
      empty: '\u05D0\u05D9\u05DF \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD',
    }
  };

  let lang = localStorage.getItem(LANG_KEY) || 'en';
  const s = () => i18n[lang];

  const micBtn = document.getElementById('micBtn');
  const toast = document.getElementById('toast');
  const transcriptEl = document.getElementById('transcript');
  const badge = document.getElementById('badge');
  const listPanel = document.getElementById('listPanel');
  const listBody = document.getElementById('listBody');

  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

  function updateBadge() {
    const n = items.filter(i => !i.checked).length;
    if (items.length) {
      badge.textContent = s().viewList(n);
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  function addItem(text) {
    text = text.trim();
    if (!text) return;
    text = text.charAt(0).toUpperCase() + text.slice(1);
    items.push({ id: uid(), text, checked: false, ts: Date.now() });
    save();
    updateBadge();
  }

  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.checked = !item.checked; save(); renderList(); updateBadge(); }
  }

  function remove(id) {
    items = items.filter(i => i.id !== id);
    save(); renderList(); updateBadge();
  }

  function clearChecked() {
    items = items.filter(i => !i.checked);
    save(); renderList(); updateBadge();
  }

  function clearAll() {
    if (items.length && confirm(s().confirmClear)) {
      items = []; save(); renderList(); updateBadge();
    }
  }

  function renderList() {
    const ls = s();
    document.getElementById('listTitle').textContent = ls.title;
    document.getElementById('clearDoneBtn').textContent = ls.clearDone;
    document.getElementById('clearAllBtn').textContent = ls.clearAll;

    if (!items.length) {
      listBody.innerHTML = `<div class="list-empty">${ls.empty}</div>`;
      return;
    }
    const sorted = [...items].sort((a, b) => a.checked - b.checked);
    listBody.innerHTML = sorted.map(item => `
      <div class="item${item.checked ? ' checked' : ''}">
        <div class="checkbox" onclick="toggle('${item.id}')"></div>
        <div class="item-text">${esc(item.text)}</div>
        <button class="delete-btn" onclick="remove('${item.id}')">&times;</button>
      </div>
    `).join('');
  }

  function openList() { renderList(); listPanel.classList.add('open'); }
  function closeList() { listPanel.classList.remove('open'); }

  function showToast(msg, ms = 2000) {
    toast.textContent = msg;
    toast.classList.add('visible');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('visible'), ms);
  }

  function applyLang() {
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
    document.getElementById('langBtn').textContent = s().toggleLang;
    localStorage.setItem(LANG_KEY, lang);
    if (recognition) recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';
    updateBadge();
  }

  function toggleLang() {
    lang = lang === 'en' ? 'he' : 'en';
    applyLang();
  }

  // --- Speech Recognition ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition, listening = false;

  if (!SpeechRecognition) {
    document.getElementById('unsupported').classList.add('show');
  } else {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      transcriptEl.textContent = s().listening;
    };

    recognition.onresult = (e) => {
      const last = e.results[e.results.length - 1];
      const transcript = last[0].transcript;

      if (last.isFinal) {
        transcriptEl.textContent = '';
        const extracted = extractItems(transcript);
        if (extracted.length) {
          extracted.forEach(addItem);
          showToast(s().added(extracted.join(', ')));
        } else {
          addItem(transcript);
          showToast(s().added(transcript.trim()));
        }
      } else {
        transcriptEl.textContent = transcript;
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') showToast(s().noSpeech, 1500);
      else if (e.error !== 'aborted') showToast('Error: ' + e.error, 2000);
      stopListening();
    };

    recognition.onend = () => stopListening();
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (listening) {
      recognition.abort();
      stopListening();
    } else {
      recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';
      try { recognition.start(); } catch(e) {}
    }
  });

  function stopListening() {
    listening = false;
    micBtn.classList.remove('listening');
    transcriptEl.textContent = '';
  }

  // --- Extract items ---
  function extractItems(text) {
    if (lang === 'he') {
      text = text
        .replace(/^(אני צריך|אני צריכה|אנחנו צריכים|תוסיף|תוסיפי|תקנה|תקני|קנה|קני|תביא|תביאי|צריך|צריכה)\s+/i, '')
        .replace(/\s+(בבקשה|תודה)\.?$/i, '')
        .trim();
      const parts = text.split(/\s*(?:,\s*|\s+וגם\s+|\s+גם\s+)/i)
        .map(s => s.trim()).filter(Boolean);
      const expanded = [];
      parts.forEach(p => {
        const sub = p.split(/\s+ו/);
        if (sub.length > 1) {
          expanded.push(sub[0].trim());
          sub.slice(1).forEach(s => { if (s.trim()) expanded.push(s.trim()); });
        } else {
          expanded.push(p);
        }
      });
      return expanded.filter(Boolean);
    }

    text = text
      .replace(/^(i need|we need|add|get|buy|grab|pick up|put|remember)\s+/i, '')
      .replace(/^(some|a|an)\s+/i, '')
      .replace(/\s+(please|thanks|thank you)\.?$/i, '')
      .trim();

    const parts = text.split(/\s*(?:,\s*|\s+and\s+|\s+also\s+)/i)
      .map(s => s.trim()).filter(Boolean);

    return parts.map(p => p.replace(/^(some|a few|a couple of|a|an)\s+/i, '').trim()).filter(Boolean);
  }

  function uid() { return Math.random().toString(36).slice(2, 10); }
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Init
  applyLang();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
